name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Honker SQLite extension
        run: make extension

      - name: Run Go tests
        run: make test

      - name: SPA — install, check, test, build
        working-directory: web
        run: |
          npm ci
          npm run check
          npm test
          npm run build

      - name: Build wire binary (verifies SPA embed)
        run: make build

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --build-tags 'sqlite_fts5 sqlite_load_extension'

      - name: Docker build
        if: runner.os == 'Linux'
        run: docker build -t wire:ci .
